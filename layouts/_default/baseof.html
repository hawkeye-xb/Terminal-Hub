<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang | default "zh" }}" data-theme="{{ .Site.Params.colorScheme | default "green" }}">
<head>
  {{- partial "head.html" . -}}
  {{ $css := resources.Get "css/main.css" | minify | fingerprint }}
  <link rel="stylesheet" href="{{ $css.RelPermalink }}">
</head>
<body>
  <header class="site-header">
    <nav class="path" id="path-display">
      <a href="/" data-nav="/">~</a>/
    </nav>
    <button class="theme-btn" id="theme-toggle" aria-label="切换主题">
      <span id="theme-label">{{ .Site.Params.colorScheme | default "green" }}</span>
    </button>
  </header>

  {{/* 首页内容 — 默认可见，命令可以替换它 */}}
  <main id="home-view" class="container">
    {{- block "main" . }}{{ end -}}
  </main>

  {{/* 命令渲染区 — cd/cat 的输出渲染到这里 */}}
  <main id="cmd-view" class="container" hidden></main>

  {{/* 命令栏 — 纯原生实现，零依赖 */}}
  <div id="cmdbar">
    <div id="cmd-completions" hidden></div>
    <div class="cmdbar-inner">
      <span id="cmd-prompt" class="cmd-prompt">~/ $</span>
      <input id="cmd-input" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="type help for commands">
      <span id="cmd-status" class="cmd-status"></span>
    </div>
  </div>

  <script src="{{ "js/cli.js" | relURL }}"></script>
</body>
</html>
